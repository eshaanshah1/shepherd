name: Shepherd
options:
  bundleIdPrefix: com.shepherd
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
packages:
  Highlighter:
    url: https://github.com/smittytone/HighlighterSwift
    from: 3.1.0
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor
    revision: 1fa4d3c
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages
    exactVersion: 0.1.20
  SwiftMarkdown:
    url: https://github.com/apple/swift-markdown
    from: 0.3.0
settings:
  base:
    SWIFT_VERSION: "5.0"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    OTHER_LDFLAGS: "-lstdc++"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    ENABLE_HARDENED_RUNTIME: "NO"
targets:
  Shepherd:
    type: application
    platform: macOS
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Shepherd-Bridging.h
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - framework: ../../vendor/GhosttyKit.xcframework
        embed: false
      - package: Highlighter
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages
      - package: SwiftMarkdown
        product: Markdown
      - target: shepherdd
        copy:
          destination: executables
      - sdk: Carbon.framework
      - sdk: GameController.framework
      - sdk: IOKit.framework
    info:
      path: Shepherd-Info.plist
      properties:
        CFBundleName: Shepherd
        CFBundleDisplayName: Shepherd
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "13.0"
        NSHighResolutionCapable: true
        CFBundleShortVersionString: "0.0.1"
        CFBundleVersion: "1"
  ShepherdModelTests:
    type: bundle.unit-test
    platform: macOS
    dependencies:
      # `@testable import Shepherd` pulls the app module's interface, which now
      # imports CodeEditSourceEditor (CodeSurfaceView) — the test target must be
      # able to resolve its transitive modules.
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages
      - package: SwiftMarkdown
        product: Markdown
    sources:
      - path: Sources/SplitTree.swift
      - path: Sources/Tab.swift
      - path: Sources/AgentState.swift
      - path: Sources/FCMMessage.swift
      - path: Sources/Theme.swift
      - path: Sources/Workspace.swift
      - path: Sources/Persistence.swift
      - path: Sources/WorktreeService.swift
      - path: Sources/ShepherdConfigWriter.swift
      - path: Sources/WorktreeHookRunner.swift
      - path: Sources/WorktreeArchive.swift
      - path: Sources/PRStatus.swift
      - path: Sources/PRComments.swift
      - path: Sources/ShortcutCatalog.swift
      - path: Sources/SequenceAlign.swift
      - path: Sources/MarkdownInlineDiff.swift
      - path: Sources/MarkdownFrontmatter.swift
      - path: Sources/MarkdownTableDiff.swift
      - path: Sources/SleepPolicy.swift
      - path: Sources/StopPolicy.swift
      - path: Sources/DiffModel.swift
      - path: Sources/CodeSurfaceState.swift
      - path: Sources/Search.swift
      - path: Sources/NotificationRoutingPolicy.swift
      - path: Sources/RemoteWiring.swift
      - path: Sources/RemoteProtocol.swift
      - path: Sources/PairingPayload.swift
      - path: Sources/TailscaleDiscovery.swift
      - path: Sources/PtyBroker.swift
      - path: Tests
  ShepherdRemoteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RemoteTests
      - path: Sources/RemoteProtocol.swift
      - path: Sources/RemoteServer.swift
      - path: Sources/RemoteClient.swift
      - path: Sources/PtyBroker.swift
  shepherdd:
    type: tool
    platform: macOS
    settings:
      base:
        PRODUCT_NAME: shepherdd
        SWIFT_OBJC_BRIDGING_HEADER: Helper/shepherdd-Bridging.h
    sources:
      - path: Helper
  ShepherdHelperTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: HelperTests/PtyShim.h
    sources:
      - path: HelperTests
      - path: Helper/HelperFrame.swift
    dependencies:
      - target: shepherdd
schemes:
  Shepherd:
    build:
      targets:
        Shepherd: all
        ShepherdModelTests: [test]
        ShepherdRemoteTests: [test]
        ShepherdHelperTests: [test]
    test:
      targets:
        - ShepherdModelTests
        - ShepherdRemoteTests
        - ShepherdHelperTests
